name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          go build -ldflags "-s -w -X github.com/jo-cube/pbl/internal/buildinfo.version=${VERSION}" -o dist/pbl ./cmd/pbl
          tar -czf "dist/pbl_${GOOS}_${GOARCH}.tar.gz" -C dist pbl
          (cd dist && sha256sum "pbl_${GOOS}_${GOARCH}.tar.gz" > "pbl_${GOOS}_${GOARCH}.tar.gz.sha256")
          rm dist/pbl

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/pbl_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz
            dist/pbl_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz.sha256
